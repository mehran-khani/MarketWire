name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('MarketWire.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Trust Swift package macros and plugins (headless CI)
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme MarketWire \
            -derivedDataPath /tmp/MarketWire-DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation

      - name: Select iOS Simulator
        id: simulator
        run: |
          set -euo pipefail
          DEVICE_ID="$(
            xcrun simctl list devices available \
              | grep -E 'iPhone' \
              | grep -v 'unavailable' \
              | head -1 \
              | grep -Eo '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' \
              | head -1
          )"
          if [ -z "${DEVICE_ID}" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "device_id=${DEVICE_ID}" >> "${GITHUB_OUTPUT}"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme MarketWire \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -derivedDataPath /tmp/MarketWire-DerivedData \
            -parallel-testing-enabled NO \
            -enableCodeCoverage NO \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -skip-testing:MarketWireUITests
